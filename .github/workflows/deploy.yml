name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx ng build --base-href /wallis-huehsam-redesign/

      - name: Copy index to 404 for routing fallback
        run: cp dist/wallis-huehsam/browser/index.html dist/wallis-huehsam/browser/404.html

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/wallis-huehsam/browser
          branch: gh-pages
